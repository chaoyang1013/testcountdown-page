<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026春季展厅见</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  padding:20px;
  background:#0b0f15;
}

/* 背景 */
.background-layer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:url('https://s1.img-e.com/20260423/69e9b3dc1cf78.png') center/cover no-repeat;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;height:100%;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(4px);
  z-index:-1;
}

/* 卡片 */
.countdown-card{
  max-width:900px;
  width:100%;
  background:rgba(15,25,35,0.4);
  backdrop-filter:blur(16px);
  border-radius:48px;
  padding:36px 28px;
  text-align:center;
  box-shadow:0 30px 60px rgba(0,0,0,0.5);
}

/* 标题 */
.event-title{
  font-size:clamp(1.6rem,5vw,2.6rem);
  line-height:1.6;
  color:#fff;
  margin-bottom:24px;
  white-space:pre-line;
}

/* 高亮（最后一场） */
.highlight{
  display:inline-block;
  background:linear-gradient(
    180deg,
    rgba(60,60,60,0.9),
    rgba(30,30,30,0.9)
  );
  padding:6px 16px;
  margin:0 6px;
  border-radius:14px;
  font-size:0.9em;
  letter-spacing:2px;
  box-shadow:
    0 6px 20px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.08);
}

/* 倒计时 */
.timer-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  margin:30px 0;
  flex-wrap:wrap;
}

.time-block{
  text-align:center;
}

.time-number{
  font-size:clamp(3rem,10vw,5rem);
  font-weight:700;
  color:#fff;
  letter-spacing:2px;
}

.time-label{
  font-size:1.1rem;
  opacity:0.85;
  color:#fff;
}

.separator{
  font-size:3rem;
  opacity:0.6;
  color:#fff;
}

/* 时间说明 */
.deadline-info{
  margin-top:20px;
  color:#fff;
  opacity:0.9;
  font-size:1.1rem;
}

/* 状态提示 */
.status-message{
  margin-top:20px;
  font-size:1.3rem;
  color:#fff5d6;
  display:none;
}
</style>
</head>

<body>

<div class="background-layer"></div>
<div class="overlay"></div>

<main class="countdown-card">

<h1 class="event-title">
  <span class="title-line">2026春季展厅见</span>
  <span class="title-line">
    <span class="highlight">最后一场</span>总裁直播倒计时
  </span>
</h1>

<div class="timer-row">
  <div class="time-block">
    <div class="time-number" id="days">00</div>
    <div class="time-label">天</div>
  </div>

  <div class="separator">:</div>

  <div class="time-block">
    <div class="time-number" id="hours">00</div>
    <div class="time-label">时</div>
  </div>

  <div class="separator">:</div>

  <div class="time-block">
    <div class="time-number" id="minutes">00</div>
    <div class="time-label">分</div>
  </div>

  <div class="separator">:</div>

  <div class="time-block">
    <div class="time-number" id="seconds">00</div>
    <div class="time-label">秒</div>
  </div>
</div>

<div class="deadline-info">
北京时间：2026年4月25日 19:30
</div>

<div id="statusMessage" class="status-message"></div>

</main>

<script>
// ✅ 北京时间（固定 +08:00，避免时区问题）
const targetDate = new Date('2026-04-25T19:30:00+08:00');

function update(){
  const now = new Date();
  const diff = targetDate - now;

  if(diff <= 0){
    document.getElementById('statusMessage').innerText = "🎉 直播已开始！";
    document.getElementById('statusMessage').style.display = "block";

    document.getElementById('days').innerText = "00";
    document.getElementById('hours').innerText = "00";
    document.getElementById('minutes').innerText = "00";
    document.getElementById('seconds').innerText = "00";
    return;
  }

  const sec = Math.floor(diff/1000);

  document.getElementById('days').innerText =
    String(Math.floor(sec/86400)).padStart(2,'0');

  document.getElementById('hours').innerText =
    String(Math.floor((sec%86400)/3600)).padStart(2,'0');

  document.getElementById('minutes').innerText =
    String(Math.floor((sec%3600)/60)).padStart(2,'0');

  document.getElementById('seconds').innerText =
    String(sec%60).padStart(2,'0');
}

update();
setInterval(update,1000);
</script>

</body>
</html>
