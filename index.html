<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026春季展厅见</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  padding:20px;
  background:#0b0f15;
}

.background-layer{
  position:fixed;
  width:100%;height:100%;
  background:url('https://s1.img-e.com/20260423/69e9b3dc1cf78.png') center/cover no-repeat;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;height:100%;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(4px);
  z-index:-1;
}

.countdown-card{
  max-width:900px;width:100%;
  background:rgba(15,25,35,0.4);
  backdrop-filter:blur(16px);
  border-radius:48px;
  padding:36px 28px;
  text-align:center;
}

.event-title{
  font-size:clamp(1.6rem,5vw,2.6rem);
  line-height:1.5;
  color:#fff;
  margin-bottom:24px;
  white-space:pre-line;
}

.timer-row{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:30px 0;
}

.time-number{
  font-size:clamp(3rem,10vw,5rem);
  font-weight:700;
  color:#fff;
}

.time-label{
  font-size:1.2rem;
  color:#fff;
}

.separator{
  font-size:3rem;
  color:#fff;
}

.deadline-info{
  margin-top:20px;
  color:#fff;
}

.status-message{
  margin-top:20px;
  color:#fff5d6;
}
</style>
</head>

<body>

<div class="background-layer"></div>
<div class="overlay"></div>

<main class="countdown-card">

<h1 class="event-title">
2026春季展厅见
最后一场总裁直播倒计时
</h1>

<div class="timer-row">
  <div><span class="time-number" id="days">00</span><div class="time-label">天</div></div>
  <div class="separator">:</div>
  <div><span class="time-number" id="hours">00</span><div class="time-label">时</div></div>
  <div class="separator">:</div>
  <div><span class="time-number" id="minutes">00</span><div class="time-label">分</div></div>
  <div class="separator">:</div>
  <div><span class="time-number" id="seconds">00</span><div class="time-label">秒</div></div>
</div>

<div class="deadline-info">
北京时间：2026年4月25日 19:30
</div>

<div id="statusMessage" class="status-message"></div>

</main>

<script>
const targetDate = new Date('2026-04-25T19:30:00+08:00');

function update(){
  const now = new Date();
  const diff = targetDate - now;

  if(diff <= 0){
    document.getElementById('statusMessage').innerText = "🎉 直播已开始！";
    return;
  }

  const sec = Math.floor(diff/1000);

  document.getElementById('days').innerText = String(Math.floor(sec/86400)).padStart(2,'0');
  document.getElementById('hours').innerText = String(Math.floor((sec%86400)/3600)).padStart(2,'0');
  document.getElementById('minutes').innerText = String(Math.floor((sec%3600)/60)).padStart(2,'0');
  document.getElementById('seconds').innerText = String(sec%60).padStart(2,'0');
}

update();
setInterval(update,1000);
</script>

</body>
</html>
